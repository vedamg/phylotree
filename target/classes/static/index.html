<!DOCTYPE html>
<html>
<head>
    <title>PhyloTree App</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        textarea { width: 100%; height: 150px; margin-bottom: 10px; }
        button {
            padding: 10px 15px;
            margin: 5px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        #output {
            margin-top: 20px;
            padding: 10px;
            background: white;
            white-space: pre-wrap;
        }
        #tree {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h2>Phylogenetic Tree App</h2>

<textarea id="fastaInput">
>seq1
MKTAYIAKQRQISFVKSHFSRQDILDLWIYHTQGYFPDWQNY
>seq2
MKTAYIAKQRQISFVKSHFSRQDILDLWIYHTQGYFPDWQNA
</textarea>

<br>

<button onclick="runAnalysis()">Run Analysis</button>

<div id="output"></div>
<svg id="tree" width="800" height="400"></svg>

<script>

const BASE = window.location.origin;

async function runAnalysis() {
    const out = document.getElementById("output");
    out.innerText = "Running...";

    let data = document.getElementById("fastaInput").value;
    let encoded = encodeURIComponent(data);

    await fetch(`${BASE}/api/fasta?data=${encoded}`);
    await fetch(`${BASE}/api/align`);

    let res = await fetch(`${BASE}/api/tree`);
    let tree = await res.text();

    out.innerText = tree;
    drawTree(tree);
}


// 🔥 SIMPLE TREE DRAW (WITH COLORS)
function drawTree(newick) {

    document.getElementById("tree").innerHTML = "";

    const svg = d3.select("#tree");
    const width = 800, height = 400;

    const treeLayout = d3.tree().size([height, width - 100]);

    const root = d3.hierarchy(parseNewick(newick));

    treeLayout(root);

    const g = svg.append("g").attr("transform", "translate(50,0)");

    // links
    g.selectAll("line")
        .data(root.links())
        .enter()
        .append("line")
        .attr("x1", d => d.source.y)
        .attr("y1", d => d.source.x)
        .attr("x2", d => d.target.y)
        .attr("y2", d => d.target.x)
        .attr("stroke", () => randomColor());

    // nodes
    g.selectAll("circle")
        .data(root.descendants())
        .enter()
        .append("circle")
        .attr("cx", d => d.y)
        .attr("cy", d => d.x)
        .attr("r", 4)
        .attr("fill", "black");

    // labels
    g.selectAll("text")
        .data(root.descendants())
        .enter()
        .append("text")
        .attr("x", d => d.y + 5)
        .attr("y", d => d.x)
        .text(d => d.data.name || "");
}

// 🔥 NEWICK PARSER
function parseNewick(s) {
    let ancestors = [];
    let tree = {};
    let tokens = s.split(/\s*(;|\(|\)|,|:)\s*/);

    for (let i = 0; i < tokens.length; i++) {
        let token = tokens[i];

        switch (token) {
            case '(': 
                let subtree = {};
                if (!tree.children) tree.children = [];
                tree.children.push(subtree);
                ancestors.push(tree);
                tree = subtree;
                break;

            case ',':
                let sibling = {};
                ancestors[ancestors.length - 1].children.push(sibling);
                tree = sibling;
                break;

            case ')':
                tree = ancestors.pop();
                break;

            case ':':
                break;

            default:
                if (tokens[i - 1] === ':' ) {
                    tree.length = parseFloat(token);
                } else {
                    tree.name = token;
                }
        }
    }

    return tree;
}

function randomColor() {
    const colors = ["red","blue","green","purple","orange","brown","teal"];
    return colors[Math.floor(Math.random() * colors.length)];
}

</script>

</body>
</html>
