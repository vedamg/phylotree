<!DOCTYPE html>
<html>
<head>
    <title>PhyloTree App</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 30px; background: #0b0e14; color: white; }
        .container { max-width: 1200px; margin: auto; }
        .section { background: #1a1d23; padding: 25px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        
        .flex-row { display: flex; gap: 20px; margin-bottom: 15px; }
        .flex-col { flex: 1; display: flex; flex-direction: column; transition: all 0.3s ease; }
        
        label { margin-bottom: 10px; font-weight: bold; color: #00ffcc; }
        textarea { width: 100%; height: 250px; background: #252932; color: #00ffcc; border: 1px solid #444; padding: 12px; font-family: 'Courier New', monospace; border-radius: 5px; resize: none; }
        
        select, input[type="file"] { width: 100%; padding: 12px; background: #252932; color: white; border: 1px solid #444; margin-bottom: 15px; border-radius: 5px; }
        
        .controls { display: flex; gap: 15px; align-items: flex-end; }
        button { padding: 14px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 1em; }
        .btn-fetch { background: #6f42c1; color: white; margin-top: 10px; }
        .btn-run { background: #007bff; color: white; flex: 2; }
        .btn-dl { background: #28a745; color: white; flex: 1; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        
        #output { margin-top: 20px; padding: 15px; background: #000; border-left: 5px solid #007bff; color: #00ff00; font-family: monospace; }
        svg { background: white; margin-top: 25px; border-radius: 10px; width: 100%; min-height: 600px; }
        
        /* Hiding the retrieved box initially */
        #retrievedCol { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🧬 Phylogenetic Analysis Pipeline</h2>

    <div class="section">
        <label>1. Select Input Method</label>
        <select id="inputMethod" onchange="toggleInput()">
            <option value="fasta">Paste FASTA Sequences</option>
            <option value="uniprot">Enter UniProt IDs</option>
            <option value="file">Upload .fasta File</option>
        </select>

        <input type="file" id="fileInput" style="display:none;" onchange="handleFile()">

        <div class="flex-row">
            <div class="flex-col" id="inputCol">
                <label id="inputLabel">Input Sequences</label>
                <textarea id="inputBox" placeholder="Paste FASTA here..."></textarea>
                <button id="fetchBtn" class="btn-fetch" style="display:none;" onclick="doFetch()">Fetch Sequences →</button>
            </div>
            
            <div class="flex-col" id="retrievedCol">
                <label>Retrieved Sequences</label>
                <textarea id="sequenceBox" readonly></textarea>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="controls">
            <div style="flex: 1;">
                <label>2. Alignment Tool</label>
                <select id="tool" style="margin-bottom: 0;">
                    <option value="mafft">MAFFT</option>
                    <option value="muscle">MUSCLE</option>
                </select>
            </div>
            <button class="btn-run" onclick="runPipeline()">Generate Tree</button>
            <button id="dlBtn" class="btn-dl" disabled onclick="downloadImage()">Download PNG</button>
        </div>
        <div id="output">Status: Ready.</div>
    </div>

    <svg id="treeVis"></svg>
</div>

<script>
const API = window.location.origin + "/api";

function toggleInput() {
    const method = document.getElementById("inputMethod").value;
    const inputLabel = document.getElementById("inputLabel");
    const fetchBtn = document.getElementById("fetchBtn");
    const fileIn = document.getElementById("fileInput");
    const inBox = document.getElementById("inputBox");
    const retCol = document.getElementById("retrievedCol");

    // Reset visibility
    fileIn.style.display = (method === 'file') ? 'block' : 'none';
    inBox.style.display = (method === 'file') ? 'none' : 'block';
    fetchBtn.style.display = (method === 'uniprot') ? 'block' : 'none';
    
    // Set Labels
    if(method === 'uniprot') {
        inputLabel.innerText = "Enter UniProt IDs";
        inBox.placeholder = "P68871, P01308...";
    } else {
        inputLabel.innerText = "Input Sequences";
        inBox.placeholder = "Paste FASTA here...";
        retCol.style.display = "none"; // Hide second box if not UniProt
    }
}

async function handleFile() {
    const file = document.getElementById("fileInput").files[0];
    const text = await file.text();
    document.getElementById("inputBox").value = text;
    document.getElementById("inputBox").style.display = "block";
}

async function doFetch() {
    const out = document.getElementById("output");
    const input = document.getElementById("inputBox").value;
    const retCol = document.getElementById("retrievedCol");
    
    if(!input.trim()) return out.innerText = "Error: Please enter IDs.";
    
    out.innerText = "Status: Fetching...";
    try {
        const res = await fetch(`${API}/fasta?data=${encodeURIComponent(input)}&method=uniprot`);
        const data = await res.text();
        document.getElementById("sequenceBox").value = data;
        
        // Show the second box only after data is retrieved
        retCol.style.display = "flex";
        out.innerText = "Status: Sequences retrieved.";
    } catch(e) { out.innerText = "Error fetching data."; }
}

async function runPipeline() {
    const out = document.getElementById("output");
    const method = document.getElementById("inputMethod").value;
    
    // Determine which box to use
    let finalSeqs = (method === 'uniprot') 
        ? document.getElementById("sequenceBox").value 
        : document.getElementById("inputBox").value;

    const tool = document.getElementById("tool").value;

    if(!finalSeqs.trim()) return out.innerText = "Error: No sequences to process.";

    try {
        out.innerText = "Status: Aligning & Building Tree...";
        await fetch(`${API}/fasta?data=${encodeURIComponent(finalSeqs)}&method=fasta`);
        const res = await fetch(`${API}/runPipeline?tool=${tool}`);
        const nwk = await res.text();

        if (nwk.includes("(")) {
            renderTree(nwk);
            out.innerText = "Status: Success!";
            document.getElementById("dlBtn").disabled = false;
        } else { out.innerText = "Error: " + nwk; }
    } catch(e) { out.innerText = "Pipeline Error: " + e.message; }
}

function renderTree(nwk) {
    const svg = d3.select("#treeVis");
    svg.selectAll("*").remove();
    const width = 1100, height = 600;
    const root = d3.hierarchy(parseNewick(nwk));
    d3.tree().size([height - 60, width - 350])(root);
    const g = svg.append("g").attr("transform", "translate(80,30)");

    // Straight Diagonal Lines
    g.selectAll("path").data(root.links()).enter().append("path")
        .attr("d", d => `M${d.source.y},${d.source.x} L${d.target.y},${d.target.x}`)
        .attr("fill", "none").attr("stroke", "#333").attr("stroke-width", 2);

    g.selectAll("text").data(root.descendants()).enter().append("text")
        .attr("x", d => d.y + 12).attr("y", d => d.x + 4)
        .text(d => d.data.name).style("font-size", "14px").attr("fill", "#000").style("font-family", "monospace");
}

function parseNewick(s) {
    let ancestors = []; let tree = {};
    let tokens = s.split(/\s*(;|\(|\)|,|:)\s*/);
    for (let i = 0; i < tokens.length; i++) {
        let token = tokens[i];
        if (token === '(') {
            let subtree = {}; if (!tree.children) tree.children = [];
            tree.children.push(subtree); ancestors.push(tree); tree = subtree;
        } else if (token === ',') {
            let sibling = {}; ancestors[ancestors.length - 1].children.push(sibling); tree = sibling;
        } else if (token === ')') { tree = ancestors.pop(); }
        else if (token !== ':' && token !== ';' && tokens[i-1] !== ':') { tree.name = token; }
    }
    return tree;
}

function downloadImage() {
    const svg = document.getElementById("treeVis");
    const serializer = new XMLSerializer();
    const source = '<?xml version="1.0" standalone="no"?>\r\n' + serializer.serializeToString(svg);
    const canvas = document.createElement("canvas");
    canvas.width = svg.clientWidth * 2; canvas.height = svg.clientHeight * 2;
    const ctx = canvas.getContext("2d");
    const img = new Image();
    img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(source)));
    img.onload = function() {
        ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const a = document.createElement("a");
        a.download = "phylogeny_tree.png";
        a.href = canvas.toDataURL("image/png");
        a.click();
    };
}
</script>
</body>
</html>
