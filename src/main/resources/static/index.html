<!DOCTYPE html>
<html>
<head>
    <title>PhyloTree App</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 30px; background: #0b0e14; color: white; }
        .container { max-width: 900px; margin: auto; }
        .section { background: #1a1d23; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; }
        label { display: block; margin-bottom: 10px; font-weight: bold; color: #00ffcc; }
        textarea { width: 100%; height: 150px; background: #252932; color: white; border: 1px solid #444; padding: 10px; font-family: monospace; }
        select, input[type="file"] { width: 100%; padding: 10px; background: #252932; color: white; border: 1px solid #444; margin-bottom: 15px; }
        button { padding: 12px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-right: 10px; }
        button.secondary { background: #28a745; }
        #output { margin-top: 20px; padding: 15px; background: #1a1d23; border-left: 4px solid #007bff; color: #ffcc00; }
        svg { background: white; margin-top: 20px; border-radius: 8px; width: 100%; height: 500px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Phylogenetic Tree App</h2>

    <div class="section">
        <label>1. Sequence Input / UniProt IDs</label>
        <select id="inputMethod" onchange="toggleInput()">
            <option value="fasta">Paste FASTA</option>
            <option value="uniprot">UniProt IDs</option>
            <option value="file">Upload .fasta File</option>
        </select>
        
        <input type="file" id="fileInput" style="display:none;" onchange="handleFileUpload()">
        <textarea id="fastaArea" placeholder="Paste sequences or IDs here..."></textarea>
        <button onclick="fetchSequences()" id="fetchBtn" style="display:none; margin-top:10px;">Fetch Sequences</button>
    </div>

    <div class="section">
        <label>2. Alignment & Tree Generation</label>
        <select id="algo">
            <option value="mafft">MAFFT</option>
            <option value="muscle">MUSCLE</option>
        </select>
        <button onclick="runAnalysis()">Run Full Pipeline</button>
        <button class="secondary" onclick="downloadTree()">Download Newick (.nwk)</button>
    </div>

    <div id="output">System Ready.</div>
    <svg id="tree"></svg>
</div>

<script>
const BASE = window.location.origin;
let currentTreeNewick = "";

function toggleInput() {
    const method = document.getElementById("inputMethod").value;
    document.getElementById("fileInput").style.display = (method === 'file') ? 'block' : 'none';
    document.getElementById("fastaArea").style.display = (method === 'file') ? 'none' : 'block';
    document.getElementById("fetchBtn").style.display = (method === 'uniprot') ? 'block' : 'none';
}

async function handleFileUpload() {
    const file = document.getElementById("fileInput").files[0];
    const text = await file.text();
    document.getElementById("fastaArea").value = text;
    document.getElementById("fastaArea").style.display = 'block';
}

async function fetchSequences() {
    const out = document.getElementById("output");
    const ids = document.getElementById("fastaArea").value;
    out.innerText = "Fetching sequences from UniProt...";
    try {
        const res = await fetch(`${BASE}/api/fasta?data=${encodeURIComponent(ids)}&method=uniprot`);
        const fasta = await res.text();
        document.getElementById("fastaArea").value = fasta;
        out.innerText = "Sequences fetched successfully.";
    } catch (e) { out.innerText = "Fetch failed."; }
}

async function runAnalysis() {
    const out = document.getElementById("output");
    const data = document.getElementById("fastaArea").value;
    const tool = document.getElementById("algo").value;

    try {
        out.innerText = "Saving input...";
        await fetch(`${BASE}/api/fasta?data=${encodeURIComponent(data)}&method=fasta`);

        out.innerText = `Running ${tool.toUpperCase()}...`;
        const alignRes = await fetch(`${BASE}/api/align?tool=${tool}`);
        if (!alignRes.ok) throw new Error("Alignment failed at backend.");

        out.innerText = "Generating Tree...";
        const treeRes = await fetch(`${BASE}/api/tree`);
        currentTreeNewick = await treeRes.text();

        if (currentTreeNewick.includes("(")) {
            drawTree(currentTreeNewick);
            out.innerText = "Pipeline Success!";
        } else {
            out.innerText = "Error: " + currentTreeNewick;
        }
    } catch (e) { out.innerText = "Error: " + e.message; }
}

function downloadTree() {
    if (!currentTreeNewick) return alert("Run analysis first!");
    const blob = new Blob([currentTreeNewick], { type: 'text/plain' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'phylogeny_tree.nwk';
    a.click();
}

// ... Use the drawTree and parseNewick functions from the previous correct versions ...
</script>
</body>
</html>
