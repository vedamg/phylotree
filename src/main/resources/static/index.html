<!DOCTYPE html>
<html>
<head>
    <title>PhyloTree App</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background: #0b0e14; color: white; }
        h2 { border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        textarea { 
            width: 100%; 
            height: 150px; 
            margin-bottom: 15px; 
            background: #1a1d23; 
            color: #00ffcc; 
            border: 1px solid #333; 
            padding: 10px;
            font-family: monospace;
        }
        button {
            padding: 12px 24px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background: #0056b3; }
        #output {
            margin-top: 20px;
            padding: 15px;
            background: #1a1d23;
            border-left: 4px solid #007bff;
            min-height: 20px;
        }
        #tree {
            margin-top: 30px;
            background: #ffffff; /* White background for the tree to make colors pop */
            border-radius: 8px;
        }
    </style>
</head>
<body>

<h2>Phylogenetic Tree App</h2>

<p>Enter your FASTA sequences below to generate an evolutionary tree:</p>

<textarea id="fastaInput">
>seq1
MKTAYIAKQRQISFVKSHFSRQDILDLWIYHTQGYFPDWQNY
>seq2
MKTAYIAKQRQISFVKSHFSRQDILDLWIYHTQGYFPDWQNA
</textarea>

<br>

<button onclick="runAnalysis()">Run Analysis</button>

<div id="output">No analysis running.</div>
<svg id="tree" width="800" height="400"></svg>

<script>

const BASE = window.location.origin;

async function runAnalysis() {
    const out = document.getElementById("output");
    out.innerText = "Processing sequences and calculating distances...";

    let data = document.getElementById("fastaInput").value;
    let encoded = encodeURIComponent(data);

    try {
        // Step 1: Send FASTA
        await fetch(`${BASE}/api/fasta?data=${encoded}`);
        
        // Step 2: Align
        await fetch(`${BASE}/api/align`);

        // Step 3: Get Tree Data
        let res = await fetch(`${BASE}/api/tree`);
        let treeData = await res.text();

        if (treeData) {
            drawTree(treeData);
            out.innerText = "Analysis Complete! Tree rendered below.";
        } else {
            out.innerText = "Error: Backend returned empty tree data.";
        }
    } catch (error) {
        out.innerText = "Connection Error: Is the Java backend running?";
        console.error(error);
    }
}

function drawTree(newick) {
    document.getElementById("tree").innerHTML = "";
    const svg = d3.select("#tree");
    const width = 800, height = 400;

    const treeLayout = d3.tree().size([height - 40, width - 160]);
    const root = d3.hierarchy(parseNewick(newick));

    treeLayout(root);

    const g = svg.append("g").attr("transform", "translate(60,20)");

    // Links (Branches)
    g.selectAll("line")
        .data(root.links())
        .enter()
        .append("line")
        .attr("x1", d => d.source.y)
        .attr("y1", d => d.source.x)
        .attr("x2", d => d.target.y)
        .attr("y2", d => d.target.x)
        .attr("stroke", () => randomColor())
        .attr("stroke-width", 2);

    // Nodes
    g.selectAll("circle")
        .data(root.descendants())
        .enter()
        .append("circle")
        .attr("cx", d => d.y)
        .attr("cy", d => d.x)
        .attr("r", 5)
        .attr("fill", "#333");

    // Labels
    g.selectAll("text")
        .data(root.descendants())
        .enter()
        .append("text")
        .attr("x", d => d.y + 10)
        .attr("y", d => d.x + 5)
        .attr("fill", "#333")
        .style("font-size", "12px")
        .style("font-weight", "bold")
        .text(d => d.data.name || "");
}

function parseNewick(s) {
    let ancestors = [];
    let tree = {};
    let tokens = s.split(/\s*(;|\(|\)|,|:)\s*/);

    for (let i = 0; i < tokens.length; i++) {
        let token = tokens[i];
        switch (token) {
            case '(': 
                let subtree = {};
                if (!tree.children) tree.children = [];
                tree.children.push(subtree);
                ancestors.push(tree);
                tree = subtree;
                break;
            case ',':
                let sibling = {};
                ancestors[ancestors.length - 1].children.push(sibling);
                tree = sibling;
                break;
            case ')':
                tree = ancestors.pop();
                break;
            case ':':
                break;
            default:
                if (tokens[i - 1] === ':' ) {
                    tree.length = parseFloat(token);
                } else {
                    tree.name = token;
                }
        }
    }
    return tree;
}

function randomColor() {
    const colors = ["#e63946", "#457b9d", "#2a9d8f", "#8338ec", "#f4a261", "#70e000"];
    return colors[Math.floor(Math.random() * colors.length)];
}

</script>

</body>
</html>
