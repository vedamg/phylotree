<!DOCTYPE html>
<html>
<head>
    <title>PhyloTree App</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 30px; background: #0b0e14; color: white; }
        .container { max-width: 1200px; margin: auto; }
        .section { background: #1a1d23; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        
        /* Two-Box Layout */
        .flex-row { display: flex; gap: 20px; margin-bottom: 15px; }
        .flex-col { flex: 1; display: flex; flexDirection: column; }
        
        label { margin-bottom: 8px; font-weight: bold; color: #00ffcc; }
        textarea { width: 100%; height: 250px; background: #252932; color: #00ffcc; border: 1px solid #444; padding: 12px; font-family: monospace; border-radius: 5px; resize: none; }
        
        select { width: 100%; padding: 10px; background: #252932; color: white; border: 1px solid #444; margin-bottom: 10px; }
        button { padding: 14px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-fetch { background: #6f42c1; color: white; width: 100%; }
        .btn-run { background: #007bff; color: white; flex: 2; }
        .btn-dl { background: #28a745; color: white; flex: 1; }
        
        #output { margin-top: 15px; padding: 12px; background: #000; border-left: 5px solid #007bff; color: #00ff00; font-family: monospace; }
        svg { background: white; margin-top: 20px; border-radius: 10px; width: 100%; min-height: 600px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🧬 Phylogenetic Analysis Pipeline</h2>

    <div class="section">
        <div class="flex-row">
            <div class="flex-col">
                <label>Input UniProt IDs / FASTA</label>
                <textarea id="inputBox" placeholder="Enter IDs (e.g. P68871, P01308)..."></textarea>
                <button class="btn-fetch" style="margin-top:10px;" onclick="doFetch()">Fetch Sequences →</button>
            </div>
            <div class="flex-col">
                <label>Retrieved Sequences</label>
                <textarea id="sequenceBox" readonly placeholder="Sequences will appear here..."></textarea>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="flex-row" style="align-items: flex-end;">
            <div style="flex: 1;">
                <label>Alignment Tool</label>
                <select id="tool">
                    <option value="mafft">MAFFT</option>
                    <option value="muscle">MUSCLE</option>
                </select>
            </div>
            <button class="btn-run" onclick="runPipeline()">Generate Phylogenetic Tree</button>
            <button id="dlBtn" class="btn-dl" disabled onclick="downloadImage()">Download PNG</button>
        </div>
        <div id="output">Status: Ready</div>
    </div>

    <svg id="treeVis"></svg>
</div>

<script>
const API = window.location.origin + "/api";

async function doFetch() {
    const out = document.getElementById("output");
    const input = document.getElementById("inputBox").value;
    out.innerText = "Status: Fetching from UniProt...";
    try {
        const res = await fetch(`${API}/fasta?data=${encodeURIComponent(input)}&method=uniprot`);
        document.getElementById("sequenceBox").value = await res.text();
        out.innerText = "Status: Sequences retrieved successfully.";
    } catch(e) { out.innerText = "Error fetching data."; }
}

async function runPipeline() {
    const out = document.getElementById("output");
    const seqs = document.getElementById("sequenceBox").value;
    const tool = document.getElementById("tool").value;

    if(!seqs) { out.innerText = "Error: No sequences to align."; return; }

    try {
        out.innerText = "Status: Saving sequences...";
        await fetch(`${API}/fasta?data=${encodeURIComponent(seqs)}&method=fasta`);
        
        out.innerText = `Status: Aligning with ${tool.toUpperCase()}...`;
        const res = await fetch(`${API}/runPipeline?tool=${tool}`);
        const nwk = await res.text();

        if (nwk.includes("(")) {
            renderTree(nwk);
            out.innerText = "Status: Tree Generated.";
            document.getElementById("dlBtn").disabled = false;
        } else { out.innerText = "Error: " + nwk; }
    } catch(e) { out.innerText = "Pipeline Error: " + e.message; }
}

function renderTree(nwk) {
    const svg = d3.select("#treeVis");
    svg.selectAll("*").remove();
    const width = 1100, height = 600;
    const root = d3.hierarchy(parseNewick(nwk));
    const treeLayout = d3.tree().size([height - 60, width - 300]);
    treeLayout(root);

    const g = svg.append("g").attr("transform", "translate(80,30)");

    // STRAIGHT LINES (Cladogram style)
    g.selectAll("path").data(root.links()).enter().append("path")
        .attr("d", d => `M${d.source.y},${d.source.x} L${d.target.y},${d.target.x}`)
        .attr("fill", "none").attr("stroke", "#222").attr("stroke-width", 1.5);

    g.selectAll("text").data(root.descendants()).enter().append("text")
        .attr("x", d => d.y + 10).attr("y", d => d.x + 4)
        .text(d => d.data.name).style("font-size", "13px").attr("fill", "#000");
}

// ... (Keep parseNewick and downloadImage functions from previous version) ...
function parseNewick(s) {
    let ancestors = []; let tree = {};
    let tokens = s.split(/\s*(;|\(|\)|,|:)\s*/);
    for (let i = 0; i < tokens.length; i++) {
        let token = tokens[i];
        if (token === '(') {
            let subtree = {}; if (!tree.children) tree.children = [];
            tree.children.push(subtree); ancestors.push(tree); tree = subtree;
        } else if (token === ',') {
            let sibling = {}; ancestors[ancestors.length - 1].children.push(sibling); tree = sibling;
        } else if (token === ')') { tree = ancestors.pop(); }
        else if (token !== ':' && token !== ';' && tokens[i-1] !== ':') { tree.name = token; }
    }
    return tree;
}

function downloadImage() {
    const svg = document.getElementById("treeVis");
    const serializer = new XMLSerializer();
    const source = '<?xml version="1.0" standalone="no"?>\r\n' + serializer.serializeToString(svg);
    const canvas = document.createElement("canvas");
    canvas.width = svg.clientWidth * 2;
    canvas.height = svg.clientHeight * 2;
    const ctx = canvas.getContext("2d");
    const img = new Image();
    img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(source)));
    img.onload = function() {
        ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const a = document.createElement("a");
        a.download = "tree_output.png";
        a.href = canvas.toDataURL("image/png");
        a.click();
    };
}
</script>
</body>
</html>
