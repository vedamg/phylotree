<!DOCTYPE html>
<html>
<head>
    <title>PhyloTree App</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 40px; background: #0b0e14; color: white; }
        .section { background: #1a1d23; padding: 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #333; }
        label { display: block; margin-bottom: 12px; font-weight: bold; color: #00ffcc; }
        textarea { width: 100%; height: 200px; background: #252932; color: #00ffcc; border: 1px solid #444; padding: 12px; font-family: monospace; }
        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-fetch { background: #6f42c1; color: white; }
        #output { margin-top: 20px; padding: 15px; background: #000; border-left: 5px solid #007bff; color: #00ff00; font-family: monospace; }
        #treeVis { background: white; margin-top: 25px; border-radius: 10px; width: 100%; min-height: 500px; }
    </style>
</head>
<body>

<div style="max-width: 1000px; margin: auto;">
    <h2>🧬 Phylogenetic Pipeline</h2>

    <div class="section">
        <label>1. Gather Sequences</label>
        <select id="method" style="width: 100%; padding: 10px; margin-bottom: 10px;" onchange="updateUI()">
            <option value="fasta">Paste FASTA</option>
            <option value="uniprot">UniProt IDs</option>
            <option value="file">Upload .fasta</option>
        </select>
        <input type="file" id="fileIn" style="display:none;" onchange="loadLocalFile()">
        <textarea id="sequenceBox" placeholder="Paste data..."></textarea>
        <button id="fetchBtn" class="btn-fetch" style="display:none; margin-top:10px;" onclick="doFetch()">Fetch from UniProt</button>
    </div>

    <div class="section">
        <label>2. Run & Export</label>
        <select id="tool" style="width: 100%; padding: 10px; margin-bottom: 15px;">
            <option value="mafft">MAFFT</option>
            <option value="muscle">MUSCLE</option>
        </select>
        <div class="btn-row">
            <button class="btn-primary" onclick="runAll()">Generate Tree</button>
            <button id="dlBtn" class="btn-success" style="opacity: 0.5;" onclick="downloadImage()" disabled>Download PNG Image</button>
        </div>
    </div>

    <div id="output">Status: Ready.</div>
    <svg id="treeVis"></svg>
</div>

<script>
const API = window.location.origin + "/api";

function updateUI() {
    const m = document.getElementById("method").value;
    document.getElementById("fileIn").style.display = (m==='file') ? 'block' : 'none';
    document.getElementById("fetchBtn").style.display = (m==='uniprot') ? 'block' : 'none';
}

async function loadLocalFile() {
    const file = document.getElementById("fileIn").files[0];
    document.getElementById("sequenceBox").value = await file.text();
}

async function doFetch() {
    const box = document.getElementById("sequenceBox");
    const out = document.getElementById("output");
    out.innerText = "Status: Fetching...";
    const res = await fetch(`${API}/fasta?data=${encodeURIComponent(box.value)}&method=uniprot`);
    box.value = await res.text();
    out.innerText = "Status: Sequences retrieved.";
}

async function runAll() {
    const out = document.getElementById("output");
    const box = document.getElementById("sequenceBox");
    const tool = document.getElementById("tool").value;

    try {
        out.innerText = "Status: Processing...";
        await fetch(`${API}/fasta?data=${encodeURIComponent(box.value)}&method=fasta`);
        const res = await fetch(`${API}/runPipeline?tool=${tool}`);
        const nwk = await res.text();

        if (nwk.includes("(")) {
            renderTree(nwk);
            out.innerText = "Status: Success.";
            document.getElementById("dlBtn").disabled = false;
            document.getElementById("dlBtn").style.opacity = 1;
        } else { out.innerText = "Error: " + nwk; }
    } catch(e) { out.innerText = "Error: " + e.message; }
}

function downloadImage() {
    const svg = document.getElementById("treeVis");
    const serializer = new XMLSerializer();
    const source = '<?xml version="1.0" standalone="no"?>\r\n' + serializer.serializeToString(svg);
    const canvas = document.createElement("canvas");
    canvas.width = svg.clientWidth * 2;
    canvas.height = svg.clientHeight * 2;
    const ctx = canvas.getContext("2d");
    const img = new Image();
    img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(source)));
    img.onload = function() {
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const a = document.createElement("a");
        a.download = "phylogeny.png";
        a.href = canvas.toDataURL("image/png");
        a.click();
    };
}

function renderTree(nwk) {
    const svg = d3.select("#treeVis");
    svg.selectAll("*").remove();
    const width = 1000, height = 500;
    const root = d3.hierarchy(parseNewick(nwk));
    d3.tree().size([height - 40, width - 250])(root);
    const g = svg.append("g").attr("transform", "translate(60,20)");
    g.selectAll("path").data(root.links()).enter().append("path")
        .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x))
        .attr("fill", "none").attr("stroke", "#000").attr("stroke-width", 2);
    g.selectAll("text").data(root.descendants()).enter().append("text")
        .attr("x", d => d.y + 10).attr("y", d => d.x + 4)
        .text(d => d.data.name).style("font-size", "14px").attr("fill", "#000");
}

function parseNewick(s) {
    let ancestors = []; let tree = {};
    let tokens = s.split(/\s*(;|\(|\)|,|:)\s*/);
    for (let i = 0; i < tokens.length; i++) {
        let token = tokens[i];
        if (token === '(') {
            let subtree = {}; if (!tree.children) tree.children = [];
            tree.children.push(subtree); ancestors.push(tree); tree = subtree;
        } else if (token === ',') {
            let sibling = {}; ancestors[ancestors.length - 1].children.push(sibling); tree = sibling;
        } else if (token === ')') { tree = ancestors.pop(); }
        else if (token !== ':' && token !== ';' && tokens[i-1] !== ':') { tree.name = token; }
    }
    return tree;
}
</script>
</body>
</html>
